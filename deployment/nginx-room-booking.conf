server {
    listen 80;
    server_name booking.internal.example;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name booking.internal.example;

    ssl_certificate /etc/letsencrypt/live/booking.internal.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booking.internal.example/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 5m;

    location /static/ {
        alias /opt/room-booking/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
