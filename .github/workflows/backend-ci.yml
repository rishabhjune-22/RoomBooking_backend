name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "bookings/**"
      - "hostels/**"
      - "requirements.txt"
      - "manage.py"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "bookings/**"
      - "hostels/**"
      - "requirements.txt"
      - "manage.py"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: room_booking
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DJANGO_ENVIRONMENT: development
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ci-secret-value-with-enough-entropy-1234567890
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      DB_NAME: room_booking
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      CELERY_TASK_ALWAYS_EAGER: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Check migration state
        run: python manage.py migrate --check

      - name: Run tests
        run: python manage.py test

      - name: Deploy checks
        env:
          DJANGO_ENVIRONMENT: production
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: prod-secret-value-with-enough-entropy-1234567890abcdefghijklmnopqrstuvwxyz
          DJANGO_ALLOWED_HOSTS: booking.internal.example
          DB_PASSWORD: not-root-production-password
          DJANGO_SECURE_SSL_REDIRECT: "true"
          DJANGO_SESSION_COOKIE_SECURE: "true"
          DJANGO_CSRF_COOKIE_SECURE: "true"
          DJANGO_SECURE_HSTS_SECONDS: "31536000"
          DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "true"
          DJANGO_SECURE_HSTS_PRELOAD: "true"
        run: python manage.py check --deploy
